name: Build macOS Release

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create missing Flutter platform files
        run: flutter create .

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS
        run: flutter build macos --release -t main.dart

      - name: Package macOS artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/guardian_app.app guardian_app-macos-${{ inputs.release_tag }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: guardian_app-macos-${{ inputs.release_tag }}.zip

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: guardian_app-macos-${{ inputs.release_tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}